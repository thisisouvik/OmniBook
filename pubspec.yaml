name: omnibook
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/home/
    - assets/logo/
    - assets/navBar/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/appIcon.png"